<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>HEP Academy – Assistant IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --hep-navy: #0a1535;
      --hep-blue: #0d1b4b;
      --hep-orange: #e84c1e;
      --hep-orange-glow: rgba(232,76,30,0.35);
      --hep-gold: #f5a623;
      --white: #fff;
      --bg: #f0f3fa;
      --surface: #ffffff;
      --surface2: #f5f7fd;
      --border: #e0e6f5;
      --text: #0a1535;
      --text-soft: #6375a0;
      --user-bubble: #0d1b4b;
      --user-text: #fff;
      --bot-bubble: #fff;
      --bot-text: #0a1535;
      --shadow: 0 24px 64px rgba(13,27,75,0.22), 0 4px 16px rgba(13,27,75,0.1);
      --radius: 24px;
    }
    [data-theme="dark"] {
      --bg: #070c1d;
      --surface: #0f1830;
      --surface2: #152040;
      --border: #1e2d5a;
      --text: #e8edf8;
      --text-soft: #7a8db8;
      --user-bubble: #e84c1e;
      --user-text: #fff;
      --bot-bubble: #152040;
      --bot-text: #e8edf8;
      --shadow: 0 24px 64px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;transition:background 0.3s}

    /* ── LAUNCHER ── */
    #hep-launcher {
      position:fixed;bottom:32px;right:32px;
      width:72px;height:72px;border-radius:50%;
      cursor:pointer;z-index:9999;border:none;padding:0;
      background:transparent;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #hep-launcher:hover{transform:scale(1.12)}
    #hep-launcher:active{transform:scale(0.94)}

    /* Glow rings */
    #hep-launcher::before,#hep-launcher::after{
      content:"";position:absolute;inset:0;border-radius:50%;
      background:radial-gradient(circle,var(--hep-orange-glow) 0%,transparent 70%);
    }
    #hep-launcher::before{animation:glow-pulse 2.5s ease-out infinite}
    #hep-launcher::after{animation:glow-pulse 2.5s ease-out infinite 0.8s}
    @keyframes glow-pulse{
      0%{transform:scale(1);opacity:0.8}
      70%{transform:scale(2.2);opacity:0}
      100%{transform:scale(2.2);opacity:0}
    }

    #hep-badge{
      position:absolute;top:0;right:0;
      width:20px;height:20px;background:var(--hep-orange);
      border-radius:50%;border:2.5px solid white;
      display:flex;align-items:center;justify-content:center;
      font-size:9px;font-weight:800;color:white;font-family:'Syne',sans-serif;
      animation:badge-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes badge-pop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0deg)}}

    /* ── CHAT WINDOW ── */
    #hep-chat{
      position:fixed;bottom:120px;right:32px;
      width:420px;max-height:620px;
      background:var(--surface);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      display:flex;flex-direction:column;overflow:hidden;
      z-index:9998;border:1px solid var(--border);
      transform:scale(0.8) translateY(40px);
      opacity:0;pointer-events:none;
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s ease;
    }
    #hep-chat.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}

    /* Header */
    .chat-header{
      background:linear-gradient(135deg,#0a1535 0%,#0d1b4b 60%,#162460 100%);
      padding:18px 16px;display:flex;align-items:center;gap:12px;
      position:relative;overflow:hidden;
    }
    .chat-header::before{
      content:"";position:absolute;top:-30px;right:-30px;
      width:120px;height:120px;
      background:radial-gradient(circle,rgba(232,76,30,0.15) 0%,transparent 70%);
      pointer-events:none;
    }
    .chat-header::after{
      content:"";position:absolute;bottom:-20px;left:30px;
      width:80px;height:80px;
      background:radial-gradient(circle,rgba(245,166,35,0.08) 0%,transparent 70%);
      pointer-events:none;
    }

    .header-avatar{
      width:46px;height:46px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,#1a2d6b,#0d1b4b);
      border:2px solid rgba(232,76,30,0.5);
      display:flex;align-items:center;justify-content:center;
      position:relative;z-index:1;
    }
    .header-avatar::after{
      content:"";position:absolute;inset:-4px;border-radius:50%;
      border:1px solid rgba(232,76,30,0.2);
    }

    .chat-header-info{flex:1;position:relative;z-index:1}
    .chat-header-info h3{
      font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
      color:white;letter-spacing:0.5px;
    }
    .chat-header-info p{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px;display:flex;align-items:center;gap:5px}
    .online-dot{
      width:7px;height:7px;background:#4ade80;border-radius:50%;
      flex-shrink:0;box-shadow:0 0 6px #4ade80;
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    .header-actions{display:flex;gap:5px;align-items:center;position:relative;z-index:1}
    .lang-toggle{display:flex;background:rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.12)}
    .lang-btn{border:none;cursor:pointer;padding:5px 10px;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:0.8px;color:rgba(255,255,255,0.5);background:transparent;transition:all 0.2s}
    .lang-btn.active{background:var(--hep-orange);color:white}
    .header-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.7);font-size:13px;transition:all 0.2s}
    .header-btn:hover{background:rgba(255,255,255,0.18);color:white}

    /* Quick chips */
    .quick-bar{
      display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;
      background:var(--surface2);border-bottom:1px solid var(--border);
    }
    .quick-bar::-webkit-scrollbar{display:none}
    .quick-chip{
      flex-shrink:0;border:1.5px solid var(--border);background:var(--surface);
      color:var(--text);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;
      padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;
      transition:all 0.2s;
    }
    .quick-chip:hover{background:var(--hep-orange);border-color:var(--hep-orange);color:white;transform:translateY(-1px)}

    /* Messages */
    .messages{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .messages::-webkit-scrollbar{width:3px}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .msg{display:flex;gap:8px;align-items:flex-end}
    .msg.user{flex-direction:row-reverse}

    .msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}

    .msg-bubble{
      max-width:80%;padding:11px 14px;border-radius:18px;
      font-size:13px;line-height:1.6;
      animation:msg-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes msg-in{0%{transform:scale(0.75) translateY(12px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}

    .msg.bot .msg-bubble{
      background:var(--bot-bubble);color:var(--bot-text);
      border:1px solid var(--border);border-bottom-left-radius:5px;
      box-shadow:0 2px 8px rgba(13,27,75,0.07);
    }
    .msg.user .msg-bubble{
      background:linear-gradient(135deg,var(--user-bubble),#1a3080);
      color:var(--user-text);border-bottom-right-radius:5px;
      box-shadow:0 4px 14px rgba(13,27,75,0.3);
    }
    .msg-time{font-size:9.5px;color:var(--text-soft);margin-top:3px}
    .msg.bot .msg-time{text-align:left;padding-left:2px}
    .msg.user .msg-time{text-align:right;padding-right:2px}

    /* Typing */
    .typing-dots{display:flex;gap:5px;align-items:center;padding:3px 2px}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--hep-orange);animation:dot-bounce 1s ease-in-out infinite}
    .typing-dots span:nth-child(2){animation-delay:0.18s}
    .typing-dots span:nth-child(3){animation-delay:0.36s}
    @keyframes dot-bounce{0%,80%,100%{transform:translateY(0);opacity:0.35}40%{transform:translateY(-7px);opacity:1}}

    /* Welcome card */
    .welcome-card{
      background:linear-gradient(135deg,#0a1535 0%,#1a3080 100%);
      border-radius:16px;padding:18px;color:white;
      border:1px solid rgba(232,76,30,0.2);
      position:relative;overflow:hidden;
    }
    .welcome-card::before{
      content:"";position:absolute;top:-20px;right:-20px;
      width:100px;height:100px;
      background:radial-gradient(circle,rgba(232,76,30,0.12) 0%,transparent 70%);
    }
    .welcome-card h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:7px;position:relative}
    .welcome-card p{font-size:12px;opacity:0.75;line-height:1.6;position:relative}

    /* Input */
    .input-area{padding:12px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end}
    .input-wrap{flex:1;position:relative}
    #msg-input{
      width:100%;background:var(--surface2);
      border:1.5px solid var(--border);border-radius:16px;
      padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:13px;
      color:var(--text);outline:none;resize:none;max-height:100px;
      transition:border-color 0.2s,box-shadow 0.2s;line-height:1.4;
    }
    #msg-input::placeholder{color:var(--text-soft)}
    #msg-input:focus{border-color:var(--hep-orange);box-shadow:0 0 0 3px var(--hep-orange-glow)}

    #send-btn{
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(135deg,var(--hep-orange),#c93d0f);
      border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
      transition:all 0.2s;box-shadow:0 4px 14px rgba(232,76,30,0.4);
    }
    #send-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(232,76,30,0.5)}
    #send-btn:active{transform:scale(0.92)}

    .chat-footer{text-align:center;padding:7px;font-size:10px;color:var(--text-soft);border-top:1px solid var(--border)}
    .chat-footer span{color:var(--hep-orange);font-weight:600}

    @media(max-width:480px){
      #hep-chat{right:8px;left:8px;width:auto;bottom:100px}
      #hep-launcher{right:18px;bottom:18px}
    }
  </style>
</head>
<body>

<!-- LAUNCHER -->
<button id="hep-launcher" onclick="toggleChat()" title="HEP Assistant IA">
  <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a1535"/>
        <stop offset="100%" stop-color="#1a3080"/>
      </linearGradient>
    </defs>
    <circle cx="36" cy="36" r="36" fill="url(#lg1)"/>
    <circle cx="36" cy="36" r="31" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="15" y="22" width="8" height="8" fill="#e84c1e" rx="1.5"/>
    <rect x="25" y="22" width="8" height="8" fill="#e84c1e" rx="1.5" opacity=".45"/>
    <rect x="15" y="32" width="8" height="8" fill="#e84c1e" rx="1.5" opacity=".7"/>
    <rect x="25" y="32" width="14" height="14" fill="#e84c1e" rx="1.5"/>
    <text x="41" y="44" font-family="Georgia,serif" font-weight="700" font-size="16" fill="white">HEP</text>
    <circle cx="36" cy="66" r="2" fill="white" opacity=".5"/>
    <circle cx="27" cy="64" r="1.4" fill="white" opacity=".3"/>
    <circle cx="45" cy="64" r="1.4" fill="white" opacity=".3"/>
  </svg>
  <div id="hep-badge">1</div>
</button>

<!-- CHAT WINDOW -->
<div id="hep-chat">
  <div class="chat-header">
    <div class="header-avatar">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <rect x="3" y="8" width="6" height="6" fill="#e84c1e" rx="1"/>
        <rect x="10" y="8" width="6" height="6" fill="#e84c1e" rx="1" opacity=".45"/>
        <rect x="3" y="15" width="6" height="6" fill="#e84c1e" rx="1" opacity=".7"/>
        <rect x="10" y="15" width="9" height="9" fill="#e84c1e" rx="1"/>
        <text x="20" y="23" font-family="Georgia,serif" font-weight="700" font-size="7" fill="white">H</text>
      </svg>
    </div>
    <div class="chat-header-info">
      <h3>HEP Academy AI</h3>
      <p><span class="online-dot"></span><span id="status-text">En ligne · Assistant Étudiant</span></p>
    </div>
    <div class="header-actions">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('fr')" id="btn-fr">FR</button>
        <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
      </div>
      <button class="header-btn" onclick="toggleTheme()" id="theme-btn" title="Mode sombre">🌙</button>
      <button class="header-btn" onclick="toggleChat()" title="Fermer">✕</button>
    </div>
  </div>

  <div class="quick-bar" id="quick-bar">
    <button class="quick-chip" onclick="sendQuick(this)">📚 Cours disponibles</button>
    <button class="quick-chip" onclick="sendQuick(this)">📅 Emploi du temps</button>
    <button class="quick-chip" onclick="sendQuick(this)">📝 Devoirs & rendus</button>
    <button class="quick-chip" onclick="sendQuick(this)">🎓 Certifications</button>
    <button class="quick-chip" onclick="sendQuick(this)">💬 Contacter un prof</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Posez votre question…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="chat-footer">Powered by <span>HEP Academy</span> · IA Éducative</div>
</div>

<script>
let lang = 'fr', darkMode = false, chatOpen = false;
const GEMINI_KEY = 'AIzaSyAxiF4RpIr4Uj-z4URCoIXzztfZuHgrpA8';

const i18n = {
  fr: {
    welcome_title:'👋 Bienvenue sur HEP Academy !',
    welcome_body:'Je suis votre assistant IA. Posez-moi vos questions sur vos cours, devoirs, certifications ou la vie étudiante.',
    placeholder:'Posez votre question…',
    status:'En ligne · Assistant Étudiant',
    chips:['📚 Cours disponibles','📅 Emploi du temps','📝 Devoirs & rendus','🎓 Certifications','💬 Contacter un prof'],
    error:'Désolé, une erreur s\'est produite. Réessayez.',
    system:`Tu es l'assistant IA officiel de HEP Academy (École des Hautes Études Professionnelles).
Tu aides les étudiants en mode asynchrone sur Moodle. Réponds toujours en français sauf si l'étudiant écrit en anglais.
Sois chaleureux, pédagogue, précis. Tu peux aider pour : les cours et ressources Moodle, les devoirs et quiz, les certifications, la communication avec les enseignants, les outils numériques. Tu es "HEP Assistant".`
  },
  en: {
    welcome_title:'👋 Welcome to HEP Academy!',
    welcome_body:'I\'m your AI assistant. Ask me anything about your courses, assignments, certifications, or student life.',
    placeholder:'Ask your question…',
    status:'Online · Student Assistant',
    chips:['📚 Available courses','📅 Timetable','📝 Assignments','🎓 Certifications','💬 Contact a teacher'],
    error:'Sorry, an error occurred. Please try again.',
    system:`You are the official AI assistant of HEP Academy. Help students in asynchronous mode on Moodle. Be warm, educational, precise. You are "HEP Assistant".`
  }
};

let history = [];

window.onload = () => showWelcome();

function showWelcome(){
  const t = i18n[lang];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = ''; history = [];
  addBotMessage(`<div class="welcome-card"><h4>${t.welcome_title}</h4><p>${t.welcome_body}</p></div>`);
}

function toggleChat(){
  const chat = document.getElementById('hep-chat');
  const badge = document.getElementById('hep-badge');
  chatOpen = !chatOpen;
  chat.classList.toggle('open', chatOpen);
  if(chatOpen && badge) badge.remove();
}

function toggleTheme(){
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
  document.getElementById('theme-btn').textContent = darkMode ? '☀️' : '🌙';
}

function setLang(l){
  lang = l;
  document.getElementById('btn-fr').classList.toggle('active', l==='fr');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('msg-input').placeholder = i18n[lang].placeholder;
  document.getElementById('status-text').textContent = i18n[lang].status;
  const chips = document.querySelectorAll('.quick-chip');
  i18n[lang].chips.forEach((txt,i) => { if(chips[i]) chips[i].textContent = txt; });
  showWelcome();
}

function sendQuick(el){ document.getElementById('msg-input').value = el.textContent.replace(/^[^\w]+/,''); sendMessage(); }

function handleKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }

async function sendMessage(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = ''; input.style.height = 'auto';
  addUserMessage(text);
  history.push({role:'user', content:text});
  const typingId = addTyping();
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ contents:[{ parts:[{ text:
          `${i18n[lang].system}\n\nHistorique:\n${history.map(m=>m.role+': '+m.content).join('\n')}\n\nQuestion: ${text}`
        }]}]})
      }
    );
    removeTyping(typingId);
    if(!res.ok) throw new Error('API Error');
    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Erreur';
    history.push({role:'assistant', content:reply});
    addBotMessage(fmt(reply));
  } catch(err){
    removeTyping(typingId);
    addBotMessage(i18n[lang].error);
  }
}

function fmt(t){ return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>'); }
function now(){ return new Date().toLocaleTimeString(lang==='fr'?'fr-FR':'en-US',{hour:'2-digit',minute:'2-digit'}); }

function addBotMessage(html){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div'); d.className='msg bot';
  d.innerHTML=`<div class="msg-avatar"><svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#0d1b4b"/><rect x="6" y="10" width="5" height="5" fill="#e84c1e" rx=".7"/><rect x="12" y="10" width="5" height="5" fill="#e84c1e" rx=".7" opacity=".45"/><rect x="6" y="16" width="5" height="5" fill="#e84c1e" rx=".7" opacity=".7"/><rect x="12" y="16" width="8" height="8" fill="#e84c1e" rx=".7"/></svg></div><div><div class="msg-bubble">${html}</div><div class="msg-time">${now()}</div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function addUserMessage(text){
  const msgs = document.getElementById('messages');
  const d = document.createElement('div'); d.className='msg user';
  d.innerHTML=`<div class="msg-avatar" style="background:linear-gradient(135deg,#e84c1e,#c93d0f)"><svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div><div class="msg-bubble">${text.replace(/</g,'&lt;')}</div><div class="msg-time">${now()}</div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
}

function addTyping(){
  const msgs = document.getElementById('messages');
  const id='typing-'+Date.now();
  const d = document.createElement('div'); d.className='msg bot'; d.id=id;
  d.innerHTML=`<div class="msg-avatar"><svg width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#0d1b4b"/><rect x="12" y="16" width="8" height="8" fill="#e84c1e" rx=".7"/></svg></div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(d); msgs.scrollTop=msgs.scrollHeight;
  return id;
}

function removeTyping(id){ const el=document.getElementById(id); if(el) el.remove(); }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
</script>
</body>
</html>
