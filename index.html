<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEP Academy – Assistant IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── DESIGN TOKENS ─────────────────────────────────────── */
      :root {
        --hep-blue: #0d1b4b;
        --hep-orange: #e84c1e;
        --hep-orange-soft: #f26b3e;
        --white: #ffffff;

        /* Light mode */
        --bg: #f4f6fb;
        --surface: #ffffff;
        --surface2: #eef1f8;
        --border: #dde3f0;
        --text: #0d1b4b;
        --text-soft: #5a6688;
        --user-bubble: #0d1b4b;
        --user-text: #ffffff;
        --bot-bubble: #ffffff;
        --bot-text: #0d1b4b;
        --header-bg: #0d1b4b;
        --header-text: #ffffff;
        --input-bg: #ffffff;
        --shadow: 0 8px 40px rgba(13, 27, 75, 0.18);
        --shadow-sm: 0 2px 12px rgba(13, 27, 75, 0.1);
        --radius: 20px;
      }
      [data-theme="dark"] {
        --bg: #0a0f24;
        --surface: #121b3a;
        --surface2: #1a2548;
        --border: #253060;
        --text: #e8edf8;
        --text-soft: #8a9bc4;
        --user-bubble: #e84c1e;
        --user-text: #ffffff;
        --bot-bubble: #1a2548;
        --bot-text: #e8edf8;
        --header-bg: #0a0f24;
        --header-text: #ffffff;
        --input-bg: #1a2548;
        --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
      }

      /* ── FLOATING BUTTON ───────────────────────────────────── */
      #hep-launcher {
        position: fixed;
        bottom: 28px;
        right: 28px;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        cursor: pointer;
        z-index: 9999;
        border: none;
        padding: 0;
        background: transparent;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        filter: drop-shadow(0 4px 18px rgba(232, 76, 30, 0.45));
      }
      #hep-launcher:hover {
        transform: scale(1.1) rotate(5deg);
      }
      #hep-launcher:active {
        transform: scale(0.95);
      }
      #hep-launcher svg {
        width: 68px;
        height: 68px;
      }

      /* Pulse ring */
      #hep-launcher::before {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 2px solid rgba(232, 76, 30, 0.5);
        animation: pulse-ring 2.4s ease-out infinite;
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        70% {
          transform: scale(1.35);
          opacity: 0;
        }
        100% {
          transform: scale(1.35);
          opacity: 0;
        }
      }

      /* Badge notification */
      #hep-badge {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        background: var(--hep-orange);
        border-radius: 50%;
        border: 2px solid white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: white;
        animation: badge-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes badge-pop {
        0% {
          transform: scale(0);
        }
        100% {
          transform: scale(1);
        }
      }

      /* ── CHAT WINDOW ───────────────────────────────────────── */
      #hep-chat {
        position: fixed;
        bottom: 110px;
        right: 28px;
        width: 400px;
        max-height: 600px;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 9998;
        border: 1px solid var(--border);
        transform: scale(0.85) translateY(24px);
        opacity: 0;
        pointer-events: none;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          opacity 0.25s ease;
      }
      #hep-chat.open {
        transform: scale(1) translateY(0);
        opacity: 1;
        pointer-events: all;
      }

      /* Header */
      .chat-header {
        background: var(--hep-blue);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .chat-header-logo {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        border: 2px solid rgba(255, 255, 255, 0.25);
      }
      .chat-header-logo svg {
        width: 100%;
        height: 100%;
      }
      .chat-header-info {
        flex: 1;
      }
      .chat-header-info h3 {
        font-family: "Playfair Display", serif;
        font-size: 15px;
        color: white;
        letter-spacing: 0.3px;
      }
      .chat-header-info p {
        font-size: 11.5px;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 1px;
      }
      .online-dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        animation: blink 2s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .header-actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .header-btn {
        background: rgba(255, 255, 255, 0.12);
        border: none;
        cursor: pointer;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .header-btn:hover {
        background: rgba(255, 255, 255, 0.22);
        color: white;
      }

      /* Language toggle */
      .lang-toggle {
        display: flex;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        overflow: hidden;
      }
      .lang-btn {
        border: none;
        cursor: pointer;
        padding: 5px 9px;
        font-size: 11px;
        font-weight: 600;
        font-family: "Outfit", sans-serif;
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.6);
        background: transparent;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .lang-btn.active {
        background: var(--hep-orange);
        color: white;
      }

      /* Quick actions bar */
      .quick-bar {
        display: flex;
        gap: 6px;
        padding: 10px 14px;
        overflow-x: auto;
        scrollbar-width: none;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      .quick-bar::-webkit-scrollbar {
        display: none;
      }
      .quick-chip {
        flex-shrink: 0;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-size: 11.5px;
        font-family: "Outfit", sans-serif;
        padding: 5px 12px;
        border-radius: 20px;
        cursor: pointer;
        white-space: nowrap;
        transition:
          background 0.2s,
          border-color 0.2s,
          color 0.2s;
      }
      .quick-chip:hover {
        background: var(--hep-orange);
        border-color: var(--hep-orange);
        color: white;
      }

      /* Messages */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .msg {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .msg.user {
        flex-direction: row-reverse;
      }

      .msg-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
      }
      .msg.bot .msg-avatar {
        background: var(--hep-blue);
      }
      .msg.user .msg-avatar {
        background: var(--hep-orange);
        color: white;
      }

      .msg-bubble {
        max-width: 78%;
        padding: 11px 15px;
        border-radius: 16px;
        font-size: 13.5px;
        line-height: 1.55;
        position: relative;
        animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes msg-in {
        0% {
          transform: scale(0.8) translateY(8px);
          opacity: 0;
        }
        100% {
          transform: scale(1) translateY(0);
          opacity: 1;
        }
      }
      .msg.bot .msg-bubble {
        background: var(--bot-bubble);
        color: var(--bot-text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg.user .msg-bubble {
        background: var(--user-bubble);
        color: var(--user-text);
        border-bottom-right-radius: 4px;
      }
      .msg-time {
        font-size: 10px;
        color: var(--text-soft);
        margin-top: 4px;
        text-align: right;
      }
      .msg.bot .msg-time {
        text-align: left;
      }

      /* Typing indicator */
      .typing-dots {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 2px;
      }
      .typing-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--hep-orange);
        animation: dot-bounce 0.9s ease-in-out infinite;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes dot-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      /* Welcome card */
      .welcome-card {
        background: linear-gradient(135deg, var(--hep-blue) 0%, #1a3080 100%);
        border-radius: 14px;
        padding: 16px;
        color: white;
        margin-bottom: 4px;
      }
      .welcome-card h4 {
        font-family: "Playfair Display", serif;
        font-size: 15px;
        margin-bottom: 6px;
      }
      .welcome-card p {
        font-size: 12.5px;
        opacity: 0.8;
        line-height: 1.5;
      }

      /* Input area */
      .input-area {
        padding: 12px 14px;
        border-top: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      .input-wrap {
        flex: 1;
        position: relative;
      }
      #msg-input {
        width: 100%;
        background: var(--input-bg);
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 11px 14px;
        font-family: "Outfit", sans-serif;
        font-size: 13.5px;
        color: var(--text);
        outline: none;
        resize: none;
        max-height: 100px;
        transition: border-color 0.2s;
        line-height: 1.4;
      }
      #msg-input::placeholder {
        color: var(--text-soft);
      }
      #msg-input:focus {
        border-color: var(--hep-orange);
      }

      #send-btn {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--hep-orange);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      #send-btn:hover {
        background: #c93d0f;
      }
      #send-btn:active {
        transform: scale(0.9);
      }
      #send-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Footer */
      .chat-footer {
        text-align: center;
        padding: 6px;
        font-size: 10.5px;
        color: var(--text-soft);
        border-top: 1px solid var(--border);
      }
      .chat-footer span {
        color: var(--hep-orange);
        font-weight: 600;
      }

      /* Responsive */
      @media (max-width: 480px) {
        #hep-chat {
          right: 10px;
          left: 10px;
          width: auto;
          bottom: 90px;
        }
        #hep-launcher {
          right: 16px;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── FLOATING LAUNCHER BUTTON ─────────────────────────── -->
    <button id="hep-launcher" onclick="toggleChat()" title="HEP Assistant">
      <!-- SVG Circle Logo -->
      <svg viewBox="0 0 68 68" xmlns="hep_academy.jpg">
        <defs>
          <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #0d1b4b" />
            <stop offset="100%" style="stop-color: #1a3080" />
          </linearGradient>
          <clipPath id="circleClip">
            <circle cx="34" cy="34" r="33" />
          </clipPath>
        </defs>
        <!-- Background circle -->
        <circle cx="34" cy="34" r="33" fill="url(#btnGrad)" />
        <!-- White ring -->
        <circle
          cx="34"
          cy="34"
          r="29"
          fill="none"
          stroke="white"
          stroke-width="2.5"
        />
        <!-- HEP orange pixel-mark simplified -->
        <rect x="16" y="22" width="7" height="7" fill="#e84c1e" rx="1" />
        <rect
          x="24"
          y="22"
          width="7"
          height="7"
          fill="#e84c1e"
          rx="1"
          opacity=".5"
        />
        <rect
          x="16"
          y="30"
          width="7"
          height="7"
          fill="#e84c1e"
          rx="1"
          opacity=".7"
        />
        <rect x="24" y="30" width="12" height="12" fill="#e84c1e" rx="1" />
        <!-- H -->
        <text
          x="37"
          y="40"
          font-family="Georgia,serif"
          font-weight="700"
          font-size="15"
          fill="white"
        >
          HEP
        </text>
        <!-- Bottom text arc simulation - simple dots -->
        <circle cx="34" cy="63" r="1.5" fill="white" opacity=".6" />
        <circle cx="26" cy="61" r="1.2" fill="white" opacity=".4" />
        <circle cx="42" cy="61" r="1.2" fill="white" opacity=".4" />
      </svg>
      <div id="hep-badge">1</div>
    </button>

    <!-- ── CHAT WINDOW ───────────────────────────────────────── -->
    <div id="hep-chat">
      <!-- Header -->
      <div class="chat-header">
        <div class="chat-header-logo">
          <svg viewBox="0 0 42 42" xmlns="hep_academy.jpg">
            <circle cx="21" cy="21" r="21" fill="#0d1b4b" />
            <circle
              cx="21"
              cy="21"
              r="18"
              fill="none"
              stroke="white"
              stroke-width="1.5"
            />
            <rect x="8" y="14" width="5" height="5" fill="#e84c1e" rx=".5" />
            <rect
              x="14"
              y="14"
              width="5"
              height="5"
              fill="#e84c1e"
              rx=".5"
              opacity=".5"
            />
            <rect
              x="8"
              y="20"
              width="5"
              height="5"
              fill="#e84c1e"
              rx=".5"
              opacity=".7"
            />
            <rect x="14" y="20" width="8" height="8" fill="#e84c1e" rx=".5" />
            <text
              x="23"
              y="28"
              font-family="Georgia,serif"
              font-weight="700"
              font-size="10"
              fill="white"
            >
              HEP
            </text>
          </svg>
        </div>
        <div class="chat-header-info">
          <h3>HEP Academy AI</h3>
          <p>
            <span class="online-dot"></span
            ><span id="status-text">En ligne · Assistant Étudiant</span>
          </p>
        </div>
        <div class="header-actions">
          <!-- Language toggle -->
          <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('fr')" id="btn-fr">
              FR
            </button>
            <button class="lang-btn" onclick="setLang('en')" id="btn-en">
              EN
            </button>
          </div>
          <!-- Dark mode -->
          <button
            class="header-btn"
            onclick="toggleTheme()"
            id="theme-btn"
            title="Mode sombre"
          >
            🌙
          </button>
          <!-- Close -->
          <button class="header-btn" onclick="toggleChat()" title="Fermer">
            ✕
          </button>
        </div>
      </div>

      <!-- Quick actions -->
      <div class="quick-bar" id="quick-bar">
        <button class="quick-chip" onclick="sendQuick(this)">
          📚 Cours disponibles
        </button>
        <button class="quick-chip" onclick="sendQuick(this)">
          📅 Emploi du temps
        </button>
        <button class="quick-chip" onclick="sendQuick(this)">
          📝 Devoirs & rendus
        </button>
        <button class="quick-chip" onclick="sendQuick(this)">
          🎓 Certifications
        </button>
        <button class="quick-chip" onclick="sendQuick(this)">
          💬 Contacter un prof
        </button>
      </div>

      <!-- Messages -->
      <div class="messages" id="messages"></div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-wrap">
          <textarea
            id="msg-input"
            rows="1"
            placeholder="Posez votre question…"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
        </div>
        <button id="send-btn" onclick="sendMessage()">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>

      <div class="chat-footer">
        Powered by <span>HEP Academy</span> · IA Éducative
      </div>
    </div>

    <script>
      /* ─── STATE ─────────────────────────────────────────────── */
      let lang = "fr";
      let darkMode = false;
      let chatOpen = false;
      const GEMINI_API_KEY = "AIzaSyAxiF4RpIr4Uj-z4URCoIXzztfZuHgrpA8"; // Replace in Moodle config

      /* ─── TRANSLATIONS ──────────────────────────────────────── */
      const i18n = {
        fr: {
          welcome_title: "👋 Bienvenue sur HEP Academy !",
          welcome_body:
            "Je suis votre assistant IA pour le mode asynchrone. Posez-moi vos questions sur vos cours, devoirs, certifications, ou la vie étudiante.",
          placeholder: "Posez votre question…",
          status: "En ligne · Assistant Étudiant",
          chips: [
            "📚 Cours disponibles",
            "📅 Emploi du temps",
            "📝 Devoirs & rendus",
            "🎓 Certifications",
            "💬 Contacter un prof",
          ],
          footer: "Powered by HEP Academy · IA Éducative",
          thinking: "En train de réfléchir…",
          error: "Désolé, une erreur s'est produite. Veuillez réessayer.",
          system: `Tu es l'assistant IA officiel de HEP Academy (École des Hautes Études Professionnelles). Tu aides les étudiants en mode asynchrone sur Moodle. 
Réponds toujours en français sauf si l'étudiant écrit en anglais.
Sois chaleureux, pédagogue, précis. Tu peux aider pour :
- Comprendre les cours et ressources Moodle
- Les devoirs, quiz, et rendu de travaux
- Les certifications et parcours professionnels  
- La communication avec les enseignants
- Les outils numériques de la plateforme
 Tu es "HEP Assistant".`,
        },
        en: {
          welcome_title: "👋 Welcome to HEP Academy!",
          welcome_body:
            "I'm your AI assistant for asynchronous learning. Ask me anything about your courses, assignments, certifications, or student life.",
          placeholder: "Ask your question…",
          status: "Online · Student Assistant",
          chips: [
            "📚 Available courses",
            "📅 Timetable",
            "📝 Assignments & submissions",
            "🎓 Certifications",
            "💬 Contact a teacher",
          ],
          footer: "Powered by HEP Academy · Educational AI",
          thinking: "Thinking…",
          error: "Sorry, an error occurred. Please try again.",
          system: `You are the official AI assistant of HEP Academy (École des Hautes Études Professionnelles). You help students in asynchronous mode on Moodle.
Always reply in English unless the student writes in French.
Be warm, educational, and precise. You can help with:
- Understanding courses and Moodle resources
- Assignments, quizzes, and submissions
- Certifications and professional pathways
- Communication with teachers
- Platform digital tools
 You are "HEP Assistant".`,
        },
      };

      /* ─── CONVERSATION HISTORY ──────────────────────────────── */
      let history = [];

      /* ─── INIT ──────────────────────────────────────────────── */
      window.onload = () => {
        showWelcome();
      };

      function showWelcome() {
        const t = i18n[lang];
        const msgs = document.getElementById("messages");
        msgs.innerHTML = "";
        history = [];
        addBotMessage(
          `<div class="welcome-card"><h4>${t.welcome_title}</h4><p>${t.welcome_body}</p></div>`,
        );
      }

      /* ─── TOGGLE CHAT ───────────────────────────────────────── */
      function toggleChat() {
        const chat = document.getElementById("hep-chat");
        const badge = document.getElementById("hep-badge");
        chatOpen = !chatOpen;
        chat.classList.toggle("open", chatOpen);
        if (chatOpen && badge) badge.remove();
      }

      /* ─── THEME ─────────────────────────────────────────────── */
      function toggleTheme() {
        darkMode = !darkMode;
        document.documentElement.setAttribute(
          "data-theme",
          darkMode ? "dark" : "",
        );
        document.getElementById("theme-btn").textContent = darkMode
          ? "☀️"
          : "🌙";
      }

      /* ─── LANGUAGE ──────────────────────────────────────────── */
      function setLang(l) {
        lang = l;
        document
          .getElementById("btn-fr")
          .classList.toggle("active", l === "fr");
        document
          .getElementById("btn-en")
          .classList.toggle("active", l === "en");
        // Update placeholders
        document.getElementById("msg-input").placeholder =
          i18n[lang].placeholder;
        document.getElementById("status-text").textContent = i18n[lang].status;
        // Update chips
        const chips = document.querySelectorAll(".quick-chip");
        i18n[lang].chips.forEach((txt, i) => {
          if (chips[i]) chips[i].textContent = txt;
        });
        document.querySelector(".chat-footer").innerHTML =
          `Powered by <span>HEP Academy</span> · ${lang === "fr" ? "IA Éducative" : "Educational AI"}`;
        showWelcome();
      }

      /* ─── SEND ──────────────────────────────────────────────── */
      async function sendMessage() {
        const input = document.getElementById("msg-input");
        const text = input.value.trim();

        if (!text) return;

        input.value = "";
        input.style.height = "auto";

        addUserMessage(text);

        history.push({
          role: "user",
          content: text,
        });

        const typingId = addTyping();

        try {
          const apiKey = "AIzaSyAxiF4RpIr4Uj-z4URCoIXzztfZuHgrpA8";

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: `
${i18n[lang].system}

Historique :
${history.map((m) => `${m.role}: ${m.content}`).join("\n")}

Question :
${text}
                  `,
                      },
                    ],
                  },
                ],
              }),
            },
          );

          removeTyping(typingId);

          if (!response.ok) {
            throw new Error("Gemini API Error");
          }

          const data = await response.json();

          const reply =
            data.candidates?.[0]?.content?.parts?.[0]?.text || "Erreur Gemini";

          history.push({
            role: "assistant",
            content: reply,
          });

          addBotMessage(formatMessage(reply));
        } catch (err) {
          removeTyping(typingId);

          addBotMessage(i18n[lang].error);

          console.error(err);
        }
      }

      /* ─── HELPERS ───────────────────────────────────────────── */
      function formatMessage(text) {
        return text
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>")
          .replace(/\n/g, "<br>")
          .replace(/•/g, "&bull;");
      }

      function now() {
        return new Date().toLocaleTimeString(
          lang === "fr" ? "fr-FR" : "en-US",
          { hour: "2-digit", minute: "2-digit" },
        );
      }

      function addBotMessage(html) {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg bot";
        div.innerHTML = `
    <div class="msg-avatar">
      <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="15" fill="#0d1b4b"/>
        <rect x="5" y="9" width="5" height="5" fill="#e84c1e" rx=".4"/>
        <rect x="11" y="9" width="5" height="5" fill="#e84c1e" rx=".4" opacity=".5"/>
        <rect x="5" y="15" width="5" height="5" fill="#e84c1e" rx=".4" opacity=".7"/>
        <rect x="11" y="15" width="7" height="7" fill="#e84c1e" rx=".4"/>
        <text x="19" y="22" font-family="Georgia,serif" font-weight="700" font-size="7" fill="white">H</text>
      </svg>
    </div>
    <div>
      <div class="msg-bubble">${html}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function addUserMessage(text) {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg user";
        div.innerHTML = `
    <div class="msg-avatar" style="background:var(--hep-orange);color:white">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div>
      <div class="msg-bubble">${text.replace(/</g, "&lt;")}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      function addTyping() {
        const msgs = document.getElementById("messages");
        const id = "typing-" + Date.now();
        const div = document.createElement("div");
        div.className = "msg bot";
        div.id = id;
        div.innerHTML = `
    <div class="msg-avatar">
      <svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <circle cx="15" cy="15" r="15" fill="#0d1b4b"/>
        <rect x="5" y="9" width="5" height="5" fill="#e84c1e" rx=".4"/>
        <rect x="11" y="15" width="7" height="7" fill="#e84c1e" rx=".4"/>
      </svg>
    </div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return id;
      }

      function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
      }

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 100) + "px";
      }
    </script>
  </body>
</html>
